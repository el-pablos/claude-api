name: CI/CD

on:
  push:
    branches: [main, testing]
    tags-ignore: ["v*"]
  pull_request:
    branches: [main, testing]
  workflow_dispatch:

permissions:
  contents: write
  packages: write

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: false

jobs:
  test:
    name: Test (Node ${{ matrix.node-version }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        node-version: [20, 22]

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Typecheck
        run: npm run typecheck

      - name: Run tests
        run: npm test

      - name: Run tests with coverage
        if: matrix.node-version == 22
        run: npm run test:coverage

      - name: Upload coverage artifact
        if: matrix.node-version == 22
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: coverage/
          retention-days: 7
          if-no-files-found: ignore

  docker:
    name: Docker Build
    runs-on: ubuntu-latest
    needs: test
    if: github.event_name == 'push' && (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/testing')

    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build Docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: false
          tags: claude-api:latest,claude-api:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  release:
    name: Release
    needs: [test, docker]
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/testing')

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Get base version from package.json
        id: version
        run: echo "base=$(node -p "require('./package.json').version")" >> $GITHUB_OUTPUT

      - name: Compute build number (commit count)
        id: build
        run: echo "count=$(git rev-list --count HEAD)" >> $GITHUB_OUTPUT

      - name: Compute branch suffix
        id: suffix
        run: |
          if [ "${{ github.ref }}" = "refs/heads/main" ]; then
            echo "suffix=" >> $GITHUB_OUTPUT
            echo "prerelease=false" >> $GITHUB_OUTPUT
          else
            echo "suffix=-testing" >> $GITHUB_OUTPUT
            echo "prerelease=true" >> $GITHUB_OUTPUT
          fi

      - name: Compute tag name
        id: tag
        run: |
          TAG="v${{ steps.version.outputs.base }}.${{ steps.build.outputs.count }}${{ steps.suffix.outputs.suffix }}"
          echo "name=$TAG" >> $GITHUB_OUTPUT
          echo "Will tag as: $TAG"

      - name: Create and push tag
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          if git rev-parse "${{ steps.tag.outputs.name }}" >/dev/null 2>&1; then
            echo "Tag ${{ steps.tag.outputs.name }} already exists, skipping create"
          else
            git tag -a "${{ steps.tag.outputs.name }}" -m "Release ${{ steps.tag.outputs.name }} - ${{ github.event.head_commit.message }}"
            git push origin "${{ steps.tag.outputs.name }}"
          fi

      - name: Build release notes
        id: notes
        run: |
          {
            echo "notes<<EOF"
            echo "## Release ${{ steps.tag.outputs.name }}"
            echo ""
            echo "**Branch**: \`${{ github.ref_name }}\`"
            echo "**Commit**: ${{ github.sha }}"
            echo "**Triggered by**: @${{ github.actor }}"
            echo ""
            echo "### Latest changes"
            echo ""
            git log -10 --pretty=format:"- %s (%an)" >> notes.txt
            cat notes.txt
            echo ""
            echo "EOF"
          } >> $GITHUB_OUTPUT

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.tag.outputs.name }}
          name: ${{ steps.tag.outputs.name }}
          body: ${{ steps.notes.outputs.notes }}
          generate_release_notes: true
          make_latest: ${{ steps.suffix.outputs.prerelease == 'false' && 'true' || 'false' }}
          prerelease: ${{ steps.suffix.outputs.prerelease }}
